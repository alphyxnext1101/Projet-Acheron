<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Projet Acheron</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Bahnschrift, Arial, sans-serif;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    left:20px;
    top:20px;
    z-index:100;
}

#title{
    color:white;
    font-size:42px;
    font-weight:600;
    text-decoration:underline;
    margin-bottom:25px;
}

.menuButton{
    display:block;
    width:180px;
    height:55px;

    margin-bottom:10px;

    background:#555;
    color:white;

    border:5px solid white;

    font-size:20px;
    font-family:Bahnschrift, Arial, sans-serif;

    cursor:pointer;
}

.menuButton:hover{
    transform:scale(1.03);
}
</style>
</head>

<body>

<div id="ui">

    <div id="title">
        Projet Acheron
    </div>

<button
class="menuButton"
onclick="window.location.href='Alpha.html'">
S1-Project
</button>
    <button class="menuButton">S2-Project</button>
    <button class="menuButton">S3-Project</button>
    <button class="menuButton">S4-Project</button>
    <button class="menuButton">S5-Project</button>
    <button class="menuButton">S6-Project</button>
    <button class="menuButton">S7-Project</button>
    <button class="menuButton">S8-Project</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    2000
);

camera.position.set(0,25,90);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

/* ==========================
   LUMIÈRES
========================== */

scene.add(
    new THREE.AmbientLight(
        0xffffff,
        0.35
    )
);

const starLight = new THREE.PointLight(
    0xaaddff,
    8,
    1000
);

scene.add(starLight);

/* ==========================
   GROUPE PRINCIPAL
========================== */

const system = new THREE.Group();
scene.add(system);

/* ==========================
   ÉTOILE
========================== */

const star = new THREE.Mesh(
    new THREE.SphereGeometry(
        3,
        32,
        32
    ),
    new THREE.MeshBasicMaterial({
        color:0xaaddff
    })
);

star.position.x = 30;

system.add(star);

const halo = new THREE.Mesh(
    new THREE.SphereGeometry(
        8,
        32,
        32
    ),
    new THREE.MeshBasicMaterial({
        color:0xaaddff,
        transparent:true,
        opacity:0.18
    })
);

halo.position.x = 30;

system.add(halo);

starLight.position.copy(
    star.position
);

/* ==========================
   PLANÈTES
========================== */

function createPlanet(
    size,
    color,
    distance
){

    const pivot =
        new THREE.Object3D();

    pivot.position.x = 30;

    const planet =
        new THREE.Mesh(

        new THREE.SphereGeometry(
            size,
            32,
            32
        ),

        new THREE.MeshStandardMaterial({
            color:color
        })

    );

    planet.position.x =
        distance;

    pivot.add(planet);

    system.add(pivot);

    return {
        pivot,
        planet
    };
}

const p1 =
createPlanet(
    1.5,
    0x3366ff,
    40
);

const p2 =
createPlanet(
    2.4,
    0xff8844,
    70
);

const p3 =
createPlanet(
    3.5,
    0x44ffff,
    100
);

/* ==========================
   LUNES
========================== */

const moonPivots = [];

function addMoon(
    parent,
    size,
    distance
){

    const pivot =
        new THREE.Object3D();

    const moon =
        new THREE.Mesh(

        new THREE.SphereGeometry(
            size,
            16,
            16
        ),

        new THREE.MeshStandardMaterial({
            color:0xbbbbbb
        })

    );

    moon.position.x =
        distance;

    pivot.add(moon);

    parent.add(pivot);

    moonPivots.push(pivot);
}

/* planète 1 */

addMoon(
    p1.planet,
    0.35,
    3
);

/* planète 2 */

addMoon(
    p2.planet,
    0.35,
    4
);

addMoon(
    p2.planet,
    0.28,
    6
);

addMoon(
    p2.planet,
    0.25,
    8
);

/* planète 3 */

addMoon(
    p3.planet,
    0.45,
    5
);

addMoon(
    p3.planet,
    0.38,
    7
);

addMoon(
    p3.planet,
    0.30,
    9
);

addMoon(
    p3.planet,
    0.24,
    11
);

addMoon(
    p3.planet,
    0.20,
    13
);

/* ==========================
   CEINTURE D'ASTÉROÏDES
========================== */

const belt =
    new THREE.Group();

for(
    let i=0;
    i<1200;
    i++
){

    const angle =
        Math.random()
        * Math.PI * 2;

    const radius =
        140 +
        Math.random()*20;

    const asteroid =
        new THREE.Mesh(

        new THREE.SphereGeometry(
            0.15 +
            Math.random()*0.50,
            6,
            6
        ),

        new THREE.MeshStandardMaterial({
            color:0x888888
        })

    );

    asteroid.position.set(

        50 +
        Math.cos(angle)
        * radius,

        (Math.random()-0.5)
        * 2,

        Math.sin(angle)
        * radius

    );

    belt.add(asteroid);
}

system.add(belt);

/* ==========================
   CONTRÔLE SOURIS
========================== */

let dragging = false;

document.addEventListener(
    "mousedown",
    ()=>{
        dragging=true;
    }
);

document.addEventListener(
    "mouseup",
    ()=>{
        dragging=false;
    }
);

document.addEventListener(
    "mousemove",
    (e)=>{

        if(dragging){

            system.rotation.y +=
                e.movementX
                * 0.005;

            system.rotation.x +=
                e.movementY
                * 0.005;
        }
    }
);

/* ==========================
   ZOOM
========================== */

document.addEventListener(
    "wheel",
    (e)=>{

        camera.position.z +=
            e.deltaY * 0.03;

        camera.position.z =
            Math.max(
                30,
                Math.min(
                    180,
                    camera.position.z
                )
            );
    }
);

/* ==========================
   ANIMATION
========================== */

function animate(){

    requestAnimationFrame(
        animate
    );

    if(!dragging){

        system.rotation.y
            += 0.0015;
    }

    p1.pivot.rotation.y
        += 0.010;

    p2.pivot.rotation.y
        += 0.006;

    p3.pivot.rotation.y
        += 0.003;

    moonPivots.forEach(
        (m,index)=>{

        m.rotation.y +=
            0.02 +
            index*0.001;

    });

    belt.rotation.y
        += 0.0008;

    renderer.render(
        scene,
        camera
    );
}

animate();

/* ==========================
   REDIMENSIONNEMENT
========================== */

window.addEventListener(
    "resize",
    ()=>{

        camera.aspect =
            window.innerWidth
            / window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

</script>

</body>
</html>
